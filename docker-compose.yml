# ============================================
# HnH-TV Docker Compose
# 3 services: backend (Express+React), ai (FastAPI), nginx (reverse proxy)
# ============================================

services:
  # --- Express backend + React static build ---
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hnh-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE=${JWT_EXPIRE:-7d}
      - API_URL=${API_URL:-http://localhost}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
    networks:
      - hnh-network
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:5000/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # --- FastAPI AI Chatbot ---
  ai:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: hnh-ai
    restart: unless-stopped
    environment:
      - MONGODB_URI=${MONGODB_URI}
    networks:
      - hnh-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --- Nginx reverse proxy (public-facing on port 80) ---
  nginx:
    image: nginx:alpine
    container_name: hnh-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      ai:
        condition: service_healthy
    networks:
      - hnh-network

networks:
  hnh-network:
    driver: bridge
